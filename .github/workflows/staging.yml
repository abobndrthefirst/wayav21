name: Deploy to Supabase Staging Branch

# Fires on every push to the `staging` git branch. Applies migrations and
# deploys edge functions to the Supabase staging branch. Vercel handles the
# frontend deploy independently via its Git integration.
#
# Required repo secrets:
#   SUPABASE_ACCESS_TOKEN   — personal access token from supabase.com/dashboard/account/tokens
#   SUPABASE_PROJECT_REF    — ref of the prod project (staging is a branch of it)
#
# Supabase Branching must be enabled on the project, and a persistent branch
# named `staging` must exist. See STAGING-RUNBOOK.md for one-time setup.

on:
  push:
    branches: [staging]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/functions/**'
      - 'supabase/seed.sql'
      - 'supabase/config.toml'
      - '.github/workflows/staging.yml'

  workflow_dispatch:

concurrency:
  group: supabase-staging
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_BRANCH: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Push DB migrations to staging branch
        run: supabase db push --branch "$SUPABASE_BRANCH" --include-all

      - name: Deploy edge functions to staging branch
        run: supabase functions deploy --branch "$SUPABASE_BRANCH" --no-verify-jwt

      - name: Summary
        run: |
          echo "### Staging deploy complete" >> "$GITHUB_STEP_SUMMARY"
          echo "- Branch: \`$SUPABASE_BRANCH\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Project: \`$SUPABASE_PROJECT_REF\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Migrations + functions pushed" >> "$GITHUB_STEP_SUMMARY"
