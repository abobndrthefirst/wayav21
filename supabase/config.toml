# Supabase project config — consumed by the CLI on `functions deploy`.
# Keep this file in sync with per-function policies.

project_id = "unnheqshkxpbflozechm"

# delete-account: the project's Auth keys are ES256, which the edge runtime's
# built-in JWT verifier doesn't support yet. We manually verify the caller
# inside the function via auth.getUser(), so disabling the runtime pre-check
# is safe and the only way this function works today.
[functions.delete-account]
verify_jwt = false

# Same ES256 workaround — both functions call auth.getUser() manually inside.
[functions.create-subaccount]
verify_jwt = false

[functions.delete-subaccount]
verify_jwt = false

# points-update uses _shared/auth.ts (JWKS-based ES256 verify) — runtime
# verifier is HS256-only and would reject valid tokens.
[functions.points-update]
verify_jwt = false

# Other functions that call verifyUser() from _shared/auth.ts need the
# same treatment for consistency.
[functions.mint-enrollment-token]
verify_jwt = false

[functions.send-notification]
verify_jwt = false

# admin-design-studio uses _shared/auth.ts (JWKS-based ES256 verify) and then
# enforces is_platform_admin() inside the handler. Same ES256 workaround.
[functions.admin-design-studio]
verify_jwt = false

# marketer-signup and submit-merchant-subscription are public endpoints —
# they accept anonymous form submissions and do their own validation +
# uniqueness checks, then write via the service-role client.
[functions.marketer-signup]
verify_jwt = false

[functions.submit-merchant-subscription]
verify_jwt = false
